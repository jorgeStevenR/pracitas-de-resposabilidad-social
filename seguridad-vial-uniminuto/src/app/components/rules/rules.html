<div class="rules-section">
  <div class="rules-inner">
    <div class="section-title">
      <h2>Normas básicas que todos debemos cumplir</h2>
      <p>Frente a Uniminuto — y en toda la ciudad.</p>
    </div>
    <div class="rules-grid">
      <div class="rule-chip" *ngFor="let rule of rules">
        <span class="icon">{{ rule.icon }}</span> {{ rule.text }}
      </div>
    </div>
  </div>
</div>
