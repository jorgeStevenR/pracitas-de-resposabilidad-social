<section class="team-section">
  <div class="team-header">
    <span class="team-label">👥 Autores del proyecto</span>
    <h2>Equipo comprometido con la seguridad vial</h2>
    <p>Estudiantes de Uniminuto que lideran esta campaña de responsabilidad social</p>
  </div>

  <div class="team-grid">
    @for (m of members; track m.name; let i = $index) {
      <div class="member-card" [style.animation-delay]="(i * 0.12) + 's'">
        <div class="avatar-wrap">
          <img [src]="m.img" [alt]="m.name" class="avatar" />
          <div class="avatar-ring"></div>
        </div>
        <p class="member-name">{{ m.name }}</p>
        <p class="member-role">Estudiante · Uniminuto</p>
      </div>
    }
  </div>
</section>
