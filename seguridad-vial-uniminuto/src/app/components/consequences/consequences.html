<div class="danger-section">
  <div class="danger-inner">
    <div class="section-title">
      <h2>Consecuencias reales de romper las normas</h2>
      <p>No son solo multas. Las consecuencias afectan vidas, familias y a toda la comunidad.</p>
    </div>
    <div class="danger-list">
      <div class="danger-item" *ngFor="let item of items">
        <div class="icon">{{ item.icon }}</div>
        <div>
          <h4>{{ item.title }}</h4>
          <p>{{ item.text }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
